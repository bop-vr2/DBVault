name: Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & basic checks on every PR ──────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: railway/package-lock.json

      - name: Install dependencies
        working-directory: railway
        run: npm ci

      - name: Check for syntax errors
        working-directory: railway
        run: node --check server.js dumper.js restorer.js drive.js logger.js

      - name: Verify mysqldump flags (dry run documentation check)
        run: |
          echo "Checking mysqldump is documented correctly..."
          grep -q "\-\-single-transaction" railway/dumper.js && echo "✅ --single-transaction present"
          grep -q "\-\-routines"           railway/dumper.js && echo "✅ --routines present"
          grep -q "\-\-triggers"           railway/dumper.js && echo "✅ --triggers present"
          grep -q "\-\-events"             railway/dumper.js && echo "✅ --events present"
          grep -q "\-\-hex-blob"           railway/dumper.js && echo "✅ --hex-blob present"

  # ── Deploy to Railway on push to main ────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service dbvault --detach

      - name: Verify health endpoint
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          echo "Waiting 15s for deployment to stabilise..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RAILWAY_URL/health")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
